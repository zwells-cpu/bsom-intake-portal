<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BSOM Intake Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080e1a;--surface:#0d1526;--surface2:#111d33;--surface3:#162038;
  --border:#1a2840;--border2:#243450;
  --text:#e2eaf8;--muted:#94a3b8;--dim:#4a607a;
  --accent:#6366f1;--accent2:#8b5cf6;
  --green:#22c55e;--yellow:#f59e0b;--orange:#fb923c;--red:#ef4444;
  --sidebar-w:220px;
}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",system-ui,sans-serif;min-height:100vh;font-size:14px;line-height:1.5;overflow-x:hidden}
input,select,textarea,button{outline:none;font-family:inherit}
input::placeholder,textarea::placeholder{color:var(--dim)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── HOME SCREEN ── */
.home-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:radial-gradient(ellipse at 20% 50%,#6366f108 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#8b5cf608 0%,transparent 60%)}
.home-logo{width:90px;height:90px;border-radius:20px;overflow:hidden;background:white;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 0 0 1px #ffffff10,0 20px 60px rgba(0,0,0,0.4)}
.home-logo img{width:90px;height:90px;object-fit:contain}
.home-title{font-size:28px;font-weight:800;letter-spacing:-0.03em;margin-bottom:4px;text-align:center}
.home-sub{color:var(--muted);font-size:13px;margin-bottom:48px;text-align:center}
.module-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:780px;width:100%}
.module-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px 24px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.module-card::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,var(--card-color,#6366f1)08,transparent 60%);pointer-events:none}
.module-card:hover{border-color:var(--card-color,var(--accent));transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.module-icon{font-size:28px;margin-bottom:14px}
.module-name{font-weight:800;font-size:15px;margin-bottom:5px;letter-spacing:-0.01em}
.module-desc{font-size:12px;color:var(--muted);line-height:1.5}
.module-arrow{position:absolute;top:20px;right:20px;color:var(--dim);font-size:18px;transition:all 0.2s}
.module-card:hover .module-arrow{color:var(--card-color,var(--accent));transform:translateX(2px)}

/* ── APP SHELL ── */
.shell{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:50}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo{width:34px;height:34px;border-radius:8px;overflow:hidden;background:white;flex-shrink:0}
.sidebar-logo img{width:34px;height:34px;object-fit:contain}
.sidebar-title{font-weight:800;font-size:12.5px;letter-spacing:-0.01em;line-height:1.3}
.sidebar-sub{font-size:10px;color:var(--dim)}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-section-label{font-size:10px;font-weight:700;color:var(--dim);letter-spacing:0.1em;text-transform:uppercase;padding:12px 8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:all 0.15s;color:var(--muted);font-size:13px;font-weight:500;border:1px solid transparent;margin-bottom:2px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--surface2);border-color:var(--border2);color:var(--text);font-weight:600}
.nav-item.active .nav-icon{color:var(--accent)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:#ef444420;color:#ef4444;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700}
.nav-badge.green{background:#22c55e20;color:#22c55e}
.sidebar-footer{padding:12px 14px;border-top:1px solid var(--border)}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--dim);font-size:12px;font-weight:600;cursor:pointer;padding:8px;border-radius:8px;transition:all 0.15s}
.back-btn:hover{color:var(--text);background:var(--surface2)}

.content{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:56px;border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0}
.topbar-title{font-weight:700;font-size:15px;letter-spacing:-0.01em}
.topbar-right{display:flex;align-items:center;gap:10px}
.badge-pill{background:#22c55e18;color:var(--green);border:1px solid #22c55e30;border-radius:20px;padding:3px 12px;font-size:11.5px;font-weight:700}
.btn-sm{background:transparent;border:1px solid var(--border2);border-radius:7px;padding:5px 12px;color:var(--muted);font-size:12px;cursor:pointer;font-weight:500;transition:all 0.15s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.page{flex:1;padding:28px;overflow-y:auto}

/* ── Common Components ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px}
.card-pad{padding:22px}
.section-hdr{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.label{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px;display:block}
.input-field{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;width:100%;transition:border-color 0.2s}
.input-field:focus{border-color:var(--accent)}
select option{background:var(--surface)}
.bdg{border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700;white-space:nowrap;font-family:"DM Mono",monospace;display:inline-block}
.office-pill{background:var(--surface2);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;color:var(--muted);display:inline-block}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;border-radius:9px;padding:10px 22px;font-weight:700;font-size:13px;cursor:pointer;transition:opacity 0.15s}
.btn-primary:hover{opacity:0.9}
.btn-primary:disabled{opacity:0.45;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--border2);border-radius:9px;padding:9px 18px;color:var(--muted);font-size:13px;cursor:pointer;transition:all 0.15s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-save{background:linear-gradient(135deg,var(--green),#16a34a);color:white;border:none;border-radius:9px;padding:10px 24px;font-weight:700;font-size:13px;cursor:pointer}
.btn-export{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:6px 13px;color:var(--muted);font-size:12px;cursor:pointer;font-weight:600;transition:all 0.15s}
.btn-export:hover{border-color:var(--green);color:var(--green)}
.btn-edit{background:#6366f115;border:1px solid #6366f130;border-radius:8px;padding:6px 14px;color:#a5b4fc;font-size:12px;cursor:pointer;font-weight:600;transition:all 0.15s}
.btn-edit:hover{background:#6366f125}
.btn-edit.editing{background:#f59e0b20;border-color:#f59e0b40;color:#f59e0b}

/* ── Stats ── */
.stats-row{display:grid;gap:14px;margin-bottom:24px}
.stats-4{grid-template-columns:repeat(4,1fr)}
.stats-3{grid-template-columns:repeat(3,1fr)}
.stats-2{grid-template-columns:repeat(2,1fr)}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:18px 22px}
.stat-num{font-size:30px;font-weight:800;font-family:"DM Mono",monospace;line-height:1;margin-bottom:4px}
.stat-label{font-size:12px;color:var(--muted);font-weight:500}
.stat-sub{font-size:11px;color:var(--dim);margin-top:2px}

/* ── Table ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:11px 14px;text-align:left;font-size:10.5px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:color 0.15s}
th:hover{color:var(--muted)}
th.sort-asc::after{content:" ↑";color:var(--accent)}
th.sort-desc::after{content:" ↓";color:var(--accent)}
td{padding:10px 14px;border-bottom:1px solid #0a1525;vertical-align:middle}
.row-hover{cursor:pointer;transition:background 0.12s}
.row-hover:hover{background:#ffffff05}

/* ── Filter row ── */
.filter-row{display:flex;gap:10px;margin-bottom:18px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px;pointer-events:none}
.search-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 30px;color:var(--text);font-size:13px;width:240px;transition:border-color 0.2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--dim)}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:11.5px;font-weight:700;cursor:pointer;letter-spacing:0.04em;transition:all 0.15s}
.filter-btn:hover{border-color:var(--border2);color:var(--muted)}
.filter-btn.active{border-color:var(--accent);background:#6366f115;color:#a5b4fc}

/* ── Stepper ── */
.stepper{display:flex;align-items:center;margin-bottom:32px}
.step-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:5px}
.step-dot{width:28px;height:28px;border-radius:50%;border:none;color:white;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.step-dot.done{background:var(--green)}
.step-dot.current{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.step-dot.future{background:var(--surface2);color:var(--dim);cursor:default}
.step-label{font-size:11px;font-weight:600;white-space:nowrap}
.step-line{flex:1;height:1px;margin:0 8px;margin-bottom:20px;transition:background 0.3s}
.checklist-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bg);flex-wrap:wrap;gap:8px}
.opt-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--dim);font-weight:600;font-size:12px;cursor:pointer;transition:all 0.15s}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(5px);animation:fadeIn 0.18s ease}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:18px;max-width:860px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp 0.2s ease}
.modal-head{padding:22px 28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.modal-title{font-weight:800;font-size:22px;letter-spacing:-0.02em}
.modal-sub{color:var(--muted);font-size:12.5px;margin-top:4px}
.modal-body{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:22px 28px}
.modal-foot{padding:14px 28px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.close-btn{background:var(--surface2);border:none;color:var(--muted);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:18px;line-height:1;transition:all 0.15s}
.close-btn:hover{color:var(--text)}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #0a1525;gap:8px}
.info-label{font-size:12.5px;color:var(--muted);flex-shrink:0}
.info-val{font-size:12.5px;color:#94a3b8}
.contact-val{font-family:"DM Mono",monospace;font-size:12px;color:#a5b4fc}
.edit-input{background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:5px 9px;color:var(--text);font-size:12.5px;width:100%;transition:border-color 0.2s}
.edit-input:focus{border-color:var(--accent)}
.edit-select{background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;color:var(--text);font-size:12px;cursor:pointer}
.edit-opt{padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--dim);font-weight:600;font-size:11px;cursor:pointer;transition:all 0.12px}

/* ── Charts (pure CSS bar charts) ── */
.chart-section{margin-bottom:28px}
.chart-title{font-size:13px;font-weight:700;margin-bottom:14px;color:var(--text)}
.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-label{font-size:12px;color:var(--muted);width:130px;flex-shrink:0;text-align:right;font-weight:500}
.bar-label.left{text-align:left;width:110px}
.bar-track{flex:1;background:var(--surface2);border-radius:4px;height:22px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease;display:flex;align-items:center;padding-left:8px}
.bar-val{font-size:11px;font-weight:700;color:white;font-family:"DM Mono",monospace}
.donut-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── Assessment table ── */
.assess-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;font-family:"DM Mono",monospace}

/* ── About ── */
.about-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px}
.version-row{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border)}
.version-tag{background:#6366f120;color:#a5b4fc;border:1px solid #6366f130;border-radius:6px;padding:2px 10px;font-size:11px;font-weight:700;font-family:"DM Mono",monospace}
.location-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px}

/* ── Toast / Error ── */
.toast{position:fixed;bottom:28px;right:28px;background:var(--green);color:white;border-radius:12px;padding:14px 22px;font-weight:700;font-size:14px;z-index:200;box-shadow:0 8px 32px rgba(34,197,94,0.3);animation:slideUpToast 0.3s ease}
.error-bar{background:#ef444418;border:1px solid #ef444435;color:var(--red);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.x-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px}
.loader-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:18px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideUpToast{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>

// ── DB ──
async function dbq(method,path,body){
  const r=await fetch(SB_URL+"/rest/v1/"+path,{
    method,
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=representation"},
    body:body?JSON.stringify(body):undefined
  });
  const t=await r.text();
  if(!r.ok) throw new Error(t);
  return t?JSON.parse(t):[];
}

async function load(){
  try{
    S.loading=true; go();
    const d=await dbq("GET","referrals?order=created_at.desc");
    if(d.length===0){
      S.seeding=true; go();
      for(const r of SEED) await dbq("POST","referrals",r);
      S.refs=await dbq("GET","referrals?order=created_at.desc");
      S.seeding=false;
    } else S.refs=d;
    S.error=null;
  } catch(e){ S.error="Could not connect to database."; }
  finally{ S.loading=false; go(); }
}

async function save(){
  S.saving=true; go();
  try{
    const r=await dbq("POST","referrals",S.form);
    S.refs=[r[0],...S.refs]; S.form=ef(); S.step=0; S.saving=false; S.saved=true; go();
    setTimeout(()=>{S.saved=false;go();},1800);
  } catch(e){ S.error="Could not save."; S.saving=false; go(); }
}

async function saveEdit(){
  const id=S.sel; S.updatingSel=true; go();
  try{
    const patch=Object.assign({},S.editForm);
    delete patch.id; delete patch.created_at;
    await dbq("PATCH","referrals?id=eq."+id,patch);
    S.refs=S.refs.map(r=>r.id===id?{...r,...patch}:r);
    S.editMode=false; S.updatingSel=false; go();
  } catch(e){ S.error="Could not save changes."; S.updatingSel=false; go(); }
}

async function setStatus(id,status){
  try{
    await dbq("PATCH","referrals?id=eq."+id,{status});
    S.refs=S.refs.map(r=>r.id===id?{...r,status}:r);
    S.sel=null; S.editMode=false; go();
  } catch(e){ S.error="Could not update."; go(); }
}

// ── Helpers ──
function sc(v){
  if(!v||v==="N/A") return "#64748b";
  const u=v.toUpperCase();
  if(["COMPLETED","SIGNED","YES","RECEIVED"].some(x=>u.includes(x))) return "#22c55e";
  if(["EMAILED","REMINDER","TOO YOUNG"].some(x=>u.includes(x)))       return "#f59e0b";
  if(["AWAITING","REQUESTED"].some(x=>u.includes(x)))                 return "#fb923c";
  if(u==="NO"||u.includes("PLEASE"))                                   return "#ef4444";
  return "#64748b";
}
function bdg(v){ const c=sc(v); return `<span class="bdg" style="background:${c}20;color:${c};border:1px solid ${c}38">${v||"—"}</span>`; }
function pct(r){
  const fs=["referral_form","permission_assessment","vineland","srs2","insurance_verified","autism_diagnosis","intake_paperwork","intake_personnel"];
  const done=fs.filter(f=>{ const v=(r[f]||"").toUpperCase(); return["YES","COMPLETED","SIGNED","RECEIVED"].some(x=>v.includes(x)); });
  return Math.round(done.length/fs.length*100);
}
function ring(p){
  const radius=18,circ=2*Math.PI*radius;
  const col=p>=80?"#22c55e":p>=50?"#f59e0b":"#ef4444";
  return `<svg width="44" height="44" viewBox="0 0 44 44"><circle cx="22" cy="22" r="${radius}" fill="none" stroke="#1a2840" stroke-width="4"/><circle cx="22" cy="22" r="${radius}" fill="none" stroke="${col}" stroke-width="4" stroke-dasharray="${p/100*circ} ${circ}" stroke-linecap="round" transform="rotate(-90 22 22)"/><text x="22" y="26" text-anchor="middle" font-size="10" font-weight="700" fill="${col}" font-family="DM Mono,monospace">${p}%</text></svg>`;
}
function normalizeOffice(o){
  if(o==="JACKSON") return "FLOWOOD";
  if(o==="SCHOOL")  return "DAY TREATMENT";
  if(o==="NEWTON")  return "FOREST";
  return o;
}
function officeLabel(o){
  if(o==="NEWTON")  return `<span class="office-pill">FOREST</span> <span style="font-size:10px;color:#f59e0b;font-weight:600">↩ prev. NEWTON</span>`;
  if(o==="JACKSON") return `<span class="office-pill">FLOWOOD</span> <span style="font-size:10px;color:#f59e0b;font-weight:600">↩ prev. JACKSON</span>`;
  return `<span class="office-pill">${normalizeOffice(o)||""}</span>`;
}
function toggleSort(col){
  if(S.sortCol===col){ S.sortDir=S.sortDir==="asc"?"desc":"asc"; }
  else{ S.sortCol=col; S.sortDir="asc"; }
  go();
}
function thSort(col,label){
  const cls=S.sortCol===col?(S.sortDir==="asc"?"sort-asc":"sort-desc"):"";
  return `<th class="${cls}" onclick="toggleSort('${col}')">${label}</th>`;
}
function sortList(list){
  if(!S.sortCol) return list;
  return [...list].sort((a,b)=>{
    if(S.sortCol==="pct"){ const av=pct(a),bv=pct(b); return S.sortDir==="asc"?av-bv:bv-av; }
    let av=a[S.sortCol]||"",bv=b[S.sortCol]||"";
    return S.sortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
  });
}
function exportCSV(){
  const active=S.refs.filter(r=>r.status==="active");
  const cols=["first_name","last_name","dob","caregiver","caregiver_phone","caregiver_email","office","insurance","insurance_verified","autism_diagnosis","intake_paperwork","intake_personnel","referral_form","permission_assessment","vineland","srs2","attends_school","iep_report","contact1","contact2","contact3","date_received","notes","status"];
  const csv=[cols.join(","),...active.map(r=>cols.map(c=>'"'+(r[c]||"").replace(/"/g,'""')+'"').join(","))].join("\n");
  const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([csv],{type:"text/csv"})),download:"bsom_referrals.csv"});
  a.click();
}

function renderPage(active,nr){
  if(S.loading||S.seeding) return `<div class="loader-wrap"><div class="spinner"></div><div style="color:var(--muted)">${S.seeding?"Seeding records…":"Connecting…"}</div></div>`;
  const mod=S.module, sub=S.subpage;
  if(mod==="dashboard") return renderDashboard(active,nr);
  if(mod==="intake"){
    if(sub==="all") return renderAllReferrals(active);
    if(sub==="new") return renderNewReferral();
    if(sub==="nr")  return renderNR(nr);
  }
  if(mod==="assessment") return renderAssessments(active);
  if(mod==="operations"){
    if(sub==="overview")  return renderOpsOverview(active);
    if(sub==="staff")     return renderByStaff(active);
    if(sub==="office")    return renderByOffice(active);
    if(sub==="trends")    return renderTrends(active);
    if(sub==="insurance") return renderInsurance(active);
  }
  if(mod==="about"){
    if(sub==="locations") return renderLocations();
    if(sub==="versions")  return renderVersions();
  }
  return "";
}

function renderAssessments(active){
  const fields=[
    ["Permission","permission_assessment"],
    ["Vineland","vineland"],
    ["SRS-2","srs2"],
    ["IEP Report","iep_report"],
    ["Autism DX","autism_diagnosis"],
  ];
  let fl=active.filter(r=>{
    const n=`${r.first_name} ${r.last_name}`.toLowerCase();
    return n.includes(S.assessSearch.toLowerCase())
        && (S.assessOffice==="ALL"||normalizeOffice(r.office)===S.assessOffice||r.office===S.assessOffice);
  });

  const complete=fl.filter(r=>fields.every(([,k])=>{const v=(r[k]||"").toUpperCase();return["YES","COMPLETED","SIGNED","RECEIVED"].some(x=>v.includes(x))}));
  const inProgress=fl.filter(r=>!fields.every(([,k])=>{const v=(r[k]||"").toUpperCase();return["YES","COMPLETED","SIGNED","RECEIVED"].some(x=>v.includes(x))}));

  return `
    <div class="stats-row stats-3" style="margin-bottom:20px">
      <div class="stat-box"><div class="stat-num" style="color:#6366f1">${fl.length}</div><div class="stat-label">Total Clients</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#22c55e">${complete.length}</div><div class="stat-label">All Assessments Complete</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#f59e0b">${inProgress.length}</div><div class="stat-label">In Progress</div></div>
    </div>
    <div class="filter-row">
      <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" placeholder="Search client..." value="${S.assessSearch}" oninput="S.assessSearch=this.value;go()"></div>
      <div class="filter-btns">${["ALL",...OFFICES].map(o=>`<button class="filter-btn ${S.assessOffice===o?"active":""}" onclick="S.assessOffice='${o}';go()">${o}</button>`).join("")}</div>
    </div>
    <div class="card"><div class="table-wrap"><table>
      <thead>
        <tr>
          <th>Client</th><th>Office</th><th>Personnel</th>
          ${fields.map(([l])=>`<th>${l}</th>`).join("")}
          <th>Overall</th>
        </tr>
      </thead>
      <tbody>
        ${fl.length===0?`<tr><td colspan="${5+fields.length}" style="padding:56px;text-align:center;color:var(--dim)">No clients found.</td></tr>`:fl.map(r=>`
        <tr class="row-hover" onclick="S.sel='${r.id}';S.module='intake';S.subpage='all';S.editMode=false;go()">
          <td><div style="font-weight:700">${r.first_name} ${r.last_name}</div><div style="font-size:11px;color:var(--dim)">${r.dob||""}</div></td>
          <td>${officeLabel(r.office)}</td>
          <td style="font-size:12px;color:var(--muted)">${r.intake_personnel||"—"}</td>
          ${fields.map(([,k])=>`<td>${bdg(r[k])}</td>`).join("")}
          <td>${ring(pct(r))}</td>
        </tr>`).join("")}
      </tbody>
    </table></div></div>`;
}

function barChart(items,color="#6366f1"){
  const max=Math.max(...items.map(i=>i.v),1);
  return `<div class="bar-chart">${items.map(i=>`
    <div class="bar-row">
      <span class="bar-label">${i.l}</span>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.round(i.v/max*100)}%;background:${i.color||color}">
          <span class="bar-val">${i.v}</span>
        </div>
      </div>
    </div>`).join("")}</div>`;
}

function renderOpsOverview(active){
  const byOffice=OFFICES.map(o=>{const v=active.filter(r=>normalizeOffice(r.office)===o).length;return{l:o,v};});
  const byStaff=STAFF.filter(s=>s!=="Other").map(s=>{const v=active.filter(r=>r.intake_personnel===s).length;return{l:s,v};}).filter(x=>x.v>0);
  const paperwork=[
    {l:"Signed",v:active.filter(r=>(r.intake_paperwork||"").toLowerCase().includes("signed")).length,color:"#22c55e"},
    {l:"Emailed via Adobe",v:active.filter(r=>(r.intake_paperwork||"").toLowerCase().includes("emailed")).length,color:"#f59e0b"},
    {l:"Please Send",v:active.filter(r=>(r.intake_paperwork||"").toLowerCase().includes("please")).length,color:"#ef4444"},
    {l:"Awaiting",v:active.filter(r=>(r.intake_paperwork||"").toLowerCase().includes("awaiting")).length,color:"#fb923c"},
  ].filter(x=>x.v>0);
  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
      <div class="card card-pad"><div class="chart-title">Referrals by Office</div>${barChart(byOffice,"#6366f1")}</div>
      <div class="card card-pad"><div class="chart-title">Referrals by Staff Member</div>${barChart(byStaff,"#22c55e")}</div>
      <div class="card card-pad" style="grid-column:1/-1"><div class="chart-title">Paperwork Status Breakdown</div>${barChart(paperwork)}</div>
    </div>`;
}

      const signed=clients.filter(r=>(r.intake_paperwork||"").toLowerCase().includes("signed")).length;
      return `<div class="card card-pad">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="font-weight:700;font-size:15px">${s}</div>

            <span class="bdg" style="background:#6366f120;color:#a5b4fc;border:1px solid #6366f130">${clients.length} clients</span>

          </div>
        </div>
        <div class="bar-chart">
          ${[["Signed","#22c55e"],["Pending","#f59e0b"],["Non-Responsive","#ef4444"]].map(([l,c])=>{
            const count=l==="Signed"?signed:l==="Pending"?clients.filter(r=>!["signed","completed"].includes((r.intake_paperwork||"").toLowerCase())).length:0;
            return `<div class="bar-row"><span class="bar-label">${l}</span><div class="bar-track"><div class="bar-fill" style="width:${clients.length?Math.round(count/clients.length*100):0}%;background:${c}"><span class="bar-val">${count}</span></div></div></div>`;
          }).join("")}
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

function renderByOffice(active){
  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    ${OFFICES.map(o=>{
      const clients=active.filter(r=>normalizeOffice(r.office)===o);
      const signed=clients.filter(r=>(r.intake_paperwork||"").toLowerCase().includes("signed")).length;
      const avgP=clients.length?Math.round(clients.reduce((s,r)=>s+pct(r),0)/clients.length):0;
      return `<div class="card card-pad">
        <div style="display:flex;justify-content:space-between;margin-bottom:14px">
          <div style="font-weight:700;font-size:14px">${o}</div>
          <span class="office-pill">${clients.length} clients</span>
        </div>
        <div class="info-row"><span class="info-label">Fully signed</span><span style="color:#22c55e;font-weight:700">${signed}</span></div>
        <div class="info-row"><span class="info-label">Avg completion</span><span style="color:#6366f1;font-weight:700">${avgP}%</span></div>
        <div class="info-row" style="border:none"><span class="info-label">Staff</span><span style="font-size:12px;color:var(--muted)">${[...new Set(clients.map(r=>r.intake_personnel).filter(Boolean))].join(", ")||"—"}</span></div>
      </div>`;
    }).join("")}
  </div>`;
}

function renderTrends(active){
  const byMonth={};
  active.forEach(r=>{
    if(!r.date_received) return;
    const key=r.date_received.slice(0,7);
    byMonth[key]=(byMonth[key]||0)+1;
  });
  const months=Object.keys(byMonth).sort();
  const items=months.map(m=>{
    const [y,mo]=m.split("-");
    const label=new Date(y,parseInt(mo)-1).toLocaleString("default",{month:"short",year:"2-digit"});
    return {l:label,v:byMonth[m],color:"#6366f1"};
  });
  return `<div class="card card-pad"><div class="chart-title">Monthly Intake Trends</div>
    ${items.length?barChart(items,"#6366f1"):`<div style="color:var(--dim);text-align:center;padding:40px">No date data available.</div>`}
  </div>`;
}

function renderInsurance(active){
  const counts={};
  active.forEach(r=>{if(r.insurance)counts[r.insurance]=(counts[r.insurance]||0)+1;});
  const colors=["#6366f1","#22c55e","#f59e0b","#fb923c","#ef4444","#8b5cf6","#06b6d4","#ec4899","#a3e635","#f97316"];
  const items=Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([l,v],i)=>{return{l,v,color:colors[i%colors.length]}});
  return `<div class="card card-pad"><div class="chart-title">Insurance Type Breakdown</div>
    ${barChart(items)}
    <div style="margin-top:20px;display:flex;flex-wrap:wrap;gap:10px">
      ${items.map(i=>`<div class="legend-item"><div class="legend-dot" style="background:${i.color}"></div>${i.l} (${i.v})</div>`).join("")}
    </div>
  </div>`;
}

// ══════════════════════════════════════
// ABOUT
// ══════════════════════════════════════
function renderLocations(){
  const offices=[
    {name:"Meridian",addr:"Meridian, MS",phone:"601-000-0000",type:"Main Office"},
    {name:"Forest",addr:"Forest, MS (formerly serves Newton area)",phone:"601-000-0000",type:"Clinic"},
    {name:"Flowood",addr:"Flowood, MS (formerly serves Jackson area)",phone:"601-000-0000",type:"Clinic"},
    {name:"Day Treatment",addr:"Various Locations, MS",phone:"601-000-0000",type:"Day Treatment Program"},
  ];
  return `
    <div style="margin-bottom:20px"><div style="font-weight:800;font-size:18px">Office Locations</div><div style="color:var(--muted);font-size:13px;margin-top:4px">Current BSOM clinic and office locations</div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      ${offices.map(o=>`
        <div class="about-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
            <div style="font-weight:800;font-size:16px">📍 ${o.name}</div>
            <span class="bdg" style="background:#6366f120;color:#a5b4fc;border:1px solid #6366f130">${o.type}</span>
          </div>
          <div style="color:var(--muted);font-size:13px;margin-bottom:6px">${o.addr}</div>
          <div style="color:var(--dim);font-size:12px;font-family:'DM Mono',monospace">${o.phone}</div>
        </div>`).join("")}
    </div>
    <div class="about-card" style="margin-top:16px;border-color:#f59e0b40">
      <div style="font-weight:700;color:#f59e0b;margin-bottom:8px">📋 Office Consolidation Notes</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.7">
        • <strong style="color:var(--text)">Newton Clinic</strong> has been merged into the Forest office. Existing client records from Newton are preserved with a migration badge.<br>
        • <strong style="color:var(--text)">Jackson Clinic</strong> has been consolidated into the Flowood office. Records show legacy assignment for documentation purposes.<br>
        • <strong style="color:var(--text)">School</strong> program has been renamed to <strong style="color:var(--text)">Day Treatment</strong>.
      </div>
    </div>`;
}

function renderVersions(){
  const versions=[
    {v:"v04",date:"2026-04",note:"Multi-module portal architecture. Added Dashboard, Initial Assessments, Operations & Insights, About modules. Office consolidation (Newton→Forest, Jackson→Flowood, School→Day Treatment). Legacy migration badges added."},
    {v:"v03",date:"2026-03",note:"Added BSOM logo, edit mode in modal, CSV export, role-based view, sortable columns, restore active from non-responsive, office rename to Day Treatment."},
    {v:"v02",date:"2026-03",note:"Fresh rebuild from v01. Improved dark theme, progress rings, color-coded badges, 4-step new referral form, detail modal, non-responsive tracking. Supabase integration."},
    {v:"v01",date:"2026-03",note:"Initial intake tracker build. Basic referral table, status badges, Supabase seed data for 13 active referrals."},
  ];
  return `
    <div style="margin-bottom:20px"><div style="font-weight:800;font-size:18px">Version History</div><div style="color:var(--muted);font-size:13px;margin-top:4px">BSOM Intake Portal release notes</div></div>
    <div class="about-card">
      ${versions.map((ver,i)=>`
        <div class="version-row" style="${i===versions.length-1?"border:none":""}">
          <div style="flex:1;padding-right:20px">
            <div style="font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:10px">
              <span class="version-tag">${ver.v}</span>
              ${i===0?`<span style="background:#22c55e20;color:#22c55e;border:1px solid #22c55e30;border-radius:6px;padding:1px 8px;font-size:10px;font-weight:700">Current</span>`:""}
            </div>
            <div style="font-size:12px;color:var(--muted);margin-top:6px;line-height:1.6">${ver.note}</div>
          </div>
          <div style="font-size:11px;color:var(--dim);font-family:'DM Mono',monospace;flex-shrink:0">${ver.date}</div>
        </div>`).join("")}
    </div>`;
}

// ══════════════════════════════════════
// MODAL (shared, accessible from any module)
// ══════════════════════════════════════
function renderModal(){
  const r=S.refs.find(x=>x.id===S.sel); if(!r) return "";
  const e=S.editMode?S.editForm:r;
  const ckFields=[
    ["Referral Form","referral_form",BOOL],
    ["Permission for Assessment","permission_assessment",STAT],
    ["Vineland","vineland",STAT],["SRS-2","srs2",STAT],
    ["Attends School","attends_school",BOOL],["IEP Report","iep_report",BOOL],
    ["Autism Diagnosis Docs","autism_diagnosis",["Received","Requested","Awaiting","N/A"]],
    ["Intake Paperwork","intake_paperwork",["Signed","Emailed via Adobe","Awaiting","N/A"]]
  ];
  const eOpt=(key,val,opts)=>`<div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">${opts.map(o=>{const c=sc(o);const a=val===o;return`<button class="edit-opt" onclick="S.editForm['${key}']='${o}';go()" style="border-color:${a?c:"var(--border)"};background:${a?c+"22":"var(--bg)"};color:${a?c:"var(--dim)"}">${o}</button>`;}).join("")}</div>`;
  const eText=(key,val,ph="")=>`<input class="edit-input" value="${(val||"").replace(/"/g,"&quot;")}" oninput="S.editForm['${key}']=this.value" placeholder="${ph}">`;
  const eSel=(key,val,opts)=>`<select class="edit-select" onchange="S.editForm['${key}']=this.value">${opts.map(o=>`<option ${val===o?"selected":""}>${o}</option>`).join("")}</select>`;
  const eDate=(key,val)=>`<input type="date" class="edit-input" value="${val||""}" oninput="S.editForm['${key}']=this.value">`;

  const footLeft=r.status==="active"?`
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-ghost" onclick="setStatus('${r.id}','non-responsive')" style="color:#ef4444;border-color:#ef444440;font-size:12px">Mark Non-Responsive</button>
      <button class="btn-ghost" onclick="setStatus('${r.id}','referred-out')" style="color:#8b5cf6;border-color:#8b5cf640;font-size:12px">Referred Out</button>
    </div>`:`<button onclick="setStatus('${r.id}','active')" style="padding:8px 16px;border-radius:8px;border:1px solid #22c55e40;background:#22c55e15;color:#22c55e;font-size:12px;font-weight:700;cursor:pointer">↩ Restore Active</button>`;

  return `<div class="overlay" onclick="S.sel=null;S.editMode=false;go()"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div>
        <div class="modal-title">${r.first_name} ${r.last_name}</div>
        <div class="modal-sub">DOB: ${r.dob||"—"} · Received: ${r.date_received||"—"} · ${normalizeOffice(r.office)||""}${(r.office==="NEWTON"||r.office==="JACKSON")?` <span style="color:#f59e0b;font-size:11px">(prev. ${r.office})</span>`:""}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        ${ring(pct(r))}
        <button class="btn-edit ${S.editMode?"editing":""}" onclick="if(!S.editMode){S.editForm=Object.assign({},S.refs.find(x=>x.id===S.sel));S.editMode=true;go();}else{S.editMode=false;go();}">${S.editMode?"✏ Editing":"✏ Edit Record"}</button>
        <button class="close-btn" onclick="S.sel=null;S.editMode=false;go()">×</button>
      </div>
    </div>
    <div class="modal-body">
      <div>
        <div class="section-hdr">Caregiver</div>
        ${S.editMode
          ?`<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px"><div><div class="label">Name</div>${eText("caregiver",e.caregiver,"Full Name")}</div><div><div class="label">Phone</div>${eText("caregiver_phone",e.caregiver_phone,"601-000-0000")}</div><div><div class="label">Email</div>${eText("caregiver_email",e.caregiver_email,"email@example.com")}</div></div>`
          :`${[["Name",r.caregiver],["Phone",r.caregiver_phone],["Email",r.caregiver_email]].map(([l,v])=>`<div style="margin-bottom:12px"><div class="label">${l}</div><div style="color:#cbd5e1;font-size:14px">${v||"—"}</div></div>`).join("")}`}
        <div class="section-hdr" style="margin-top:4px">Insurance</div>
        ${S.editMode
          ?`<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:4px"><div class="info-row"><span class="info-label">Primary</span>${eSel("insurance",e.insurance,INSURANCES)}</div><div class="info-row"><span class="info-label">Secondary</span>${eSel("secondary_insurance",e.secondary_insurance,["None",...INSURANCES])}</div><div class="info-row"><span class="info-label">Verified</span>${eOpt("insurance_verified",e.insurance_verified,BOOL)}</div></div>`
          :`<div class="info-row"><span class="info-label">Primary</span><span class="info-val">${r.insurance||"—"}</span></div><div class="info-row"><span class="info-label">Secondary</span><span class="info-val">${r.secondary_insurance||"—"}</span></div><div class="info-row"><span class="info-label">Verified</span>${bdg(r.insurance_verified)}</div>`}
        <div class="section-hdr" style="margin-top:16px">Contact Log</div>
        ${S.editMode
          ?`<div style="display:flex;flex-direction:column;gap:8px">${[["contact1","1st"],["contact2","2nd"],["contact3","3rd"]].map(([k,l])=>`<div class="info-row"><span class="info-label">${l} Contact</span>${eDate(k,e[k])}</div>`).join("")}</div>`
          :`${[["1st",r.contact1],["2nd",r.contact2],["3rd",r.contact3]].map(([l,v])=>`<div class="info-row"><span class="info-label">${l} Contact</span><span class="${v?"contact-val":"info-val"}">${v||"—"}</span></div>`).join("")}`}
        ${S.editMode?`<div style="margin-top:12px"><div class="label">Date Received</div>${eDate("date_received",e.date_received)}</div><div style="margin-top:10px"><div class="label">Office</div>${eSel("office",e.office,OFFICES)}</div>`:""}
      </div>
      <div>
        <div class="section-hdr">Intake Checklist</div>
        ${ckFields.map(([l,key,opts])=>`<div class="info-row"><span class="info-label">${l}</span>${S.editMode?eOpt(key,e[key],opts):bdg(r[key])}</div>`).join("")}
        <div style="margin-top:14px"><div class="label">Intake Personnel</div>
          ${S.editMode?eSel("intake_personnel",e.intake_personnel,STAFF):`<div style="color:#a5b4fc;font-weight:700;font-size:15px;margin-top:4px">${r.intake_personnel||"—"}</div>`}
        </div>
        ${S.editMode?`<div style="margin-top:14px"><div class="label">Notes</div><textarea class="edit-input" rows="3" oninput="S.editForm.notes=this.value" style="resize:vertical">${e.notes||""}</textarea></div>`:(r.notes?`<div style="margin-top:12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px"><div class="label" style="margin-bottom:6px">Notes</div><div style="color:var(--muted);font-size:13px">${r.notes}</div></div>`:"")}
      </div>
    </div>
    <div class="modal-foot">
      ${footLeft}
      <div style="display:flex;gap:8px">
        ${S.editMode
          ?`<button class="btn-ghost" onclick="S.editMode=false;go()">Cancel</button><button class="btn-save" onclick="saveEdit()" ${S.updatingSel?"disabled":""}>${S.updatingSel?"Saving…":"💾 Save Changes"}</button>`
          :`<button class="btn-primary" onclick="S.sel=null;go()">Close</button>`}
      </div>
    </div>
  </div></div>`;
}

load();
</script>
</body>
</html>
<title>BSOM Intake Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080e1a;--surface:#0d1526;--surface2:#111d33;--surface3:#162038;
  --border:#1a2840;--border2:#243450;
  --text:#e2eaf8;--muted:#94a3b8;--dim:#4a607a;
  --accent:#6366f1;--accent2:#8b5cf6;
  --green:#22c55e;--yellow:#f59e0b;--orange:#fb923c;--red:#ef4444;
  --sidebar-w:220px;
}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",system-ui,sans-serif;min-height:100vh;font-size:14px;line-height:1.5;overflow-x:hidden}
input,select,textarea,button{outline:none;font-family:inherit}
input::placeholder,textarea::placeholder{color:var(--dim)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── HOME SCREEN ── */
.home-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:radial-gradient(ellipse at 20% 50%,#6366f108 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#8b5cf608 0%,transparent 60%)}
.home-logo{width:90px;height:90px;border-radius:20px;overflow:hidden;background:white;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 0 0 1px #ffffff10,0 20px 60px rgba(0,0,0,0.4)}
.home-logo img{width:90px;height:90px;object-fit:contain}
.home-title{font-size:28px;font-weight:800;letter-spacing:-0.03em;margin-bottom:4px;text-align:center}
.home-sub{color:var(--muted);font-size:13px;margin-bottom:48px;text-align:center}
.module-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:780px;width:100%}
.module-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px 24px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.module-card::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,var(--card-color,#6366f1)08,transparent 60%);pointer-events:none}
.module-card:hover{border-color:var(--card-color,var(--accent));transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.module-icon{font-size:28px;margin-bottom:14px}
.module-name{font-weight:800;font-size:15px;margin-bottom:5px;letter-spacing:-0.01em}
.module-desc{font-size:12px;color:var(--muted);line-height:1.5}
.module-arrow{position:absolute;top:20px;right:20px;color:var(--dim);font-size:18px;transition:all 0.2s}
.module-card:hover .module-arrow{color:var(--card-color,var(--accent));transform:translateX(2px)}

/* ── APP SHELL ── */
.shell{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:50}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo{width:34px;height:34px;border-radius:8px;overflow:hidden;background:white;flex-shrink:0}
.sidebar-logo img{width:34px;height:34px;object-fit:contain}
.sidebar-title{font-weight:800;font-size:12.5px;letter-spacing:-0.01em;line-height:1.3}
.sidebar-sub{font-size:10px;color:var(--dim)}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-section-label{font-size:10px;font-weight:700;color:var(--dim);letter-spacing:0.1em;text-transform:uppercase;padding:12px 8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:all 0.15s;color:var(--muted);font-size:13px;font-weight:500;border:1px solid transparent;margin-bottom:2px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--surface2);border-color:var(--border2);color:var(--text);font-weight:600}
.nav-item.active .nav-icon{color:var(--accent)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:#ef444420;color:#ef4444;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:700}
.nav-badge.green{background:#22c55e20;color:#22c55e}
.sidebar-footer{padding:12px 14px;border-top:1px solid var(--border)}
.back-btn{display:flex;align-items:center;gap:8px;color:var(--dim);font-size:12px;font-weight:600;cursor:pointer;padding:8px;border-radius:8px;transition:all 0.15s}
.back-btn:hover{color:var(--text);background:var(--surface2)}

.content{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:56px;border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);flex-shrink:0}
.topbar-title{font-weight:700;font-size:15px;letter-spacing:-0.01em}
.topbar-right{display:flex;align-items:center;gap:10px}
.badge-pill{background:#22c55e18;color:var(--green);border:1px solid #22c55e30;border-radius:20px;padding:3px 12px;font-size:11.5px;font-weight:700}
.btn-sm{background:transparent;border:1px solid var(--border2);border-radius:7px;padding:5px 12px;color:var(--muted);font-size:12px;cursor:pointer;font-weight:500;transition:all 0.15s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.page{flex:1;padding:28px;overflow-y:auto}

/* ── Common Components ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px}
.card-pad{padding:22px}
.section-hdr{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.label{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px;display:block}
.input-field{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;width:100%;transition:border-color 0.2s}
.input-field:focus{border-color:var(--accent)}
select option{background:var(--surface)}
.bdg{border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700;white-space:nowrap;font-family:"DM Mono",monospace;display:inline-block}
.office-pill{background:var(--surface2);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;color:var(--muted);display:inline-block}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;border-radius:9px;padding:10px 22px;font-weight:700;font-size:13px;cursor:pointer;transition:opacity 0.15s}
.btn-primary:hover{opacity:0.9}
.btn-primary:disabled{opacity:0.45;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--border2);border-radius:9px;padding:9px 18px;color:var(--muted);font-size:13px;cursor:pointer;transition:all 0.15s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-save{background:linear-gradient(135deg,var(--green),#16a34a);color:white;border:none;border-radius:9px;padding:10px 24px;font-weight:700;font-size:13px;cursor:pointer}
.btn-export{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:6px 13px;color:var(--muted);font-size:12px;cursor:pointer;font-weight:600;transition:all 0.15s}
.btn-export:hover{border-color:var(--green);color:var(--green)}
.btn-edit{background:#6366f115;border:1px solid #6366f130;border-radius:8px;padding:6px 14px;color:#a5b4fc;font-size:12px;cursor:pointer;font-weight:600;transition:all 0.15s}
.btn-edit:hover{background:#6366f125}
.btn-edit.editing{background:#f59e0b20;border-color:#f59e0b40;color:#f59e0b}

/* ── Stats ── */
.stats-row{display:grid;gap:14px;margin-bottom:24px}
.stats-4{grid-template-columns:repeat(4,1fr)}
.stats-3{grid-template-columns:repeat(3,1fr)}
.stats-2{grid-template-columns:repeat(2,1fr)}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:18px 22px}
.stat-num{font-size:30px;font-weight:800;font-family:"DM Mono",monospace;line-height:1;margin-bottom:4px}
.stat-label{font-size:12px;color:var(--muted);font-weight:500}
.stat-sub{font-size:11px;color:var(--dim);margin-top:2px}

/* ── Table ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:11px 14px;text-align:left;font-size:10.5px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:color 0.15s}
th:hover{color:var(--muted)}
th.sort-asc::after{content:" ↑";color:var(--accent)}
th.sort-desc::after{content:" ↓";color:var(--accent)}
td{padding:10px 14px;border-bottom:1px solid #0a1525;vertical-align:middle}
.row-hover{cursor:pointer;transition:background 0.12s}
.row-hover:hover{background:#ffffff05}

/* ── Filter row ── */
.filter-row{display:flex;gap:10px;margin-bottom:18px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px;pointer-events:none}
.search-input{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 30px;color:var(--text);font-size:13px;width:240px;transition:border-color 0.2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--dim)}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:6px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:11.5px;font-weight:700;cursor:pointer;letter-spacing:0.04em;transition:all 0.15s}
.filter-btn:hover{border-color:var(--border2);color:var(--muted)}
.filter-btn.active{border-color:var(--accent);background:#6366f115;color:#a5b4fc}

/* ── Stepper ── */
.stepper{display:flex;align-items:center;margin-bottom:32px}
.step-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:5px}
.step-dot{width:28px;height:28px;border-radius:50%;border:none;color:white;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.step-dot.done{background:var(--green)}
.step-dot.current{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.step-dot.future{background:var(--surface2);color:var(--dim);cursor:default}
.step-label{font-size:11px;font-weight:600;white-space:nowrap}
.step-line{flex:1;height:1px;margin:0 8px;margin-bottom:20px;transition:background 0.3s}
.checklist-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bg);flex-wrap:wrap;gap:8px}
.opt-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--dim);font-weight:600;font-size:12px;cursor:pointer;transition:all 0.15s}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(5px);animation:fadeIn 0.18s ease}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:18px;max-width:860px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp 0.2s ease}
.modal-head{padding:22px 28px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.modal-title{font-weight:800;font-size:22px;letter-spacing:-0.02em}
.modal-sub{color:var(--muted);font-size:12.5px;margin-top:4px}
.modal-body{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:22px 28px}
.modal-foot{padding:14px 28px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.close-btn{background:var(--surface2);border:none;color:var(--muted);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:18px;line-height:1;transition:all 0.15s}
.close-btn:hover{color:var(--text)}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #0a1525;gap:8px}
.info-label{font-size:12.5px;color:var(--muted);flex-shrink:0}
.info-val{font-size:12.5px;color:#94a3b8}
.contact-val{font-family:"DM Mono",monospace;font-size:12px;color:#a5b4fc}
.edit-input{background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:5px 9px;color:var(--text);font-size:12.5px;width:100%;transition:border-color 0.2s}
.edit-input:focus{border-color:var(--accent)}
.edit-select{background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;color:var(--text);font-size:12px;cursor:pointer}
.edit-opt{padding:3px 9px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--dim);font-weight:600;font-size:11px;cursor:pointer;transition:all 0.12px}

/* ── Charts (pure CSS bar charts) ── */
.chart-section{margin-bottom:28px}
.chart-title{font-size:13px;font-weight:700;margin-bottom:14px;color:var(--text)}
.bar-chart{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-label{font-size:12px;color:var(--muted);width:130px;flex-shrink:0;text-align:right;font-weight:500}
.bar-label.left{text-align:left;width:110px}
.bar-track{flex:1;background:var(--surface2);border-radius:4px;height:22px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.6s ease;display:flex;align-items:center;padding-left:8px}
.bar-val{font-size:11px;font-weight:700;color:white;font-family:"DM Mono",monospace}
.donut-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── Assessment table ── */
.assess-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;font-family:"DM Mono",monospace}

/* ── About ── */
.about-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px}
.version-row{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border)}
.version-tag{background:#6366f120;color:#a5b4fc;border:1px solid #6366f130;border-radius:6px;padding:2px 10px;font-size:11px;font-weight:700;font-family:"DM Mono",monospace}
.location-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px}

/* ── Toast / Error ── */
.toast{position:fixed;bottom:28px;right:28px;background:var(--green);color:white;border-radius:12px;padding:14px 22px;font-weight:700;font-size:14px;z-index:200;box-shadow:0 8px 32px rgba(34,197,94,0.3);animation:slideUpToast 0.3s ease}
.error-bar{background:#ef444418;border:1px solid #ef444435;color:var(--red);border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.x-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px}
.loader-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:18px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideUpToast{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>

// ── DB ──
async function dbq(method,path,body){
  const r=await fetch(SB_URL+"/rest/v1/"+path,{
    method,
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=representation"},
    body:body?JSON.stringify(body):undefined
  });
  const t=await r.text();
  if(!r.ok) throw new Error(t);
  return t?JSON.parse(t):[];
}

async function load(){
  try{
    S.loading=true; go();
    const d=await dbq("GET","referrals?order=created_at.desc");
    if(d.length===0){
      S.seeding=true; go();
      for(const r of SEED) await dbq("POST","referrals",r);
      S.refs=await dbq("GET","referrals?order=created_at.desc");
      S.seeding=false;
    } else S.refs=d;
    S.error=null;
  } catch(e){ S.error="Could not connect to database."; }
  finally{ S.loading=false; go(); }
}

async function save(){
  S.saving=true; go();
  try{
    const r=await dbq("POST","referrals",S.form);
    S.refs=[r[0],...S.refs]; S.form=ef(); S.step=0; S.saving=false; S.saved=true; go();
    setTimeout(()=>{S.saved=false;go();},1800);
  } catch(e){ S.error="Could not save."; S.saving=false; go(); }
}

async function saveEdit(){
  const id=S.sel; S.updatingSel=true; go();
  try{
    const patch=Object.assign({},S.editForm);
    delete patch.id; delete patch.created_at;
    await dbq("PATCH","referrals?id=eq."+id,patch);
    S.refs=S.refs.map(r=>r.id===id?{...r,...patch}:r);
    S.editMode=false; S.updatingSel=false; go();
  } catch(e){ S.error="Could not save changes."; S.updatingSel=false; go(); }
}

async function setStatus(id,status){
  try{
    await dbq("PATCH","referrals?id=eq."+id,{status});
    S.refs=S.refs.map(r=>r.id===id?{...r,status}:r);
    S.sel=null; S.editMode=false; go();
  } catch(e){ S.error="Could not update."; go(); }
}

// ── Helpers ──
function sc(v){
  if(!v||v==="N/A") return "#64748b";
  const u=v.toUpperCase();
  if(["COMPLETED","SIGNED","YES","RECEIVED"].some(x=>u.includes(x))) return "#22c55e";
  if(["EMAILED","REMINDER","TOO YOUNG"].some(x=>u.includes(x)))       return "#f59e0b";
  if(["AWAITING","REQUESTED"].some(x=>u.includes(x)))                 return "#fb923c";
  if(u==="NO"||u.includes("PLEASE"))                                   return "#ef4444";
  return "#64748b";
}
function bdg(v){ const c=sc(v); return `<span class="bdg" style="background:${c}20;color:${c};border:1px solid ${c}38">${v||"—"}</span>`; }
function pct(r){
  const fs=["referral_form","permission_assessment","vineland","srs2","insurance_verified","autism_diagnosis","intake_paperwork","intake_personnel"];
  const done=fs.filter(f=>{ const v=(r[f]||"").toUpperCase(); return["YES","COMPLETED","SIGNED","RECEIVED"].some(x=>v.includes(x)); });
  return Math.round(done.length/fs.length*100);
}
function ring(p){
  const radius=18,circ=2*Math.PI*radius;
  const col=p>=80?"#22c55e":p>=50?"#f59e0b":"#ef4444";
  return `<svg width="44" height="44" viewBox="0 0 44 44"><circle cx="22" cy="22" r="${radius}" fill="none" stroke="#1a2840" stroke-width="4"/><circle cx="22" cy="22" r="${radius}" fill="none" stroke="${col}" stroke-width="4" stroke-dasharray="${p/100*circ} ${circ}" stroke-linecap="round" transform="rotate(-90 22 22)"/><text x="22" y="26" text-anchor="middle" font-size="10" font-weight="700" fill="${col}" font-family="DM Mono,monospace">${p}%</text></svg>`;
}
function normalizeOffice(o){
  if(o==="JACKSON") return "FLOWOOD";
  if(o==="SCHOOL")  return "DAY TREATMENT";
  if(o==="NEWTON")  return "FOREST";
  return o;
}
function officeLabel(o){
  if(o==="NEWTON")  return `<span class="office-pill">FOREST</span> <span style="font-size:10px;color:#f59e0b;font-weight:600">↩ prev. NEWTON</span>`;
  if(o==="JACKSON") return `<span class="office-pill">FLOWOOD</span> <span style="font-size:10px;color:#f59e0b;font-weight:600">↩ prev. JACKSON</span>`;
  return `<span class="office-pill">${normalizeOffice(o)||""}</span>`;
}
function toggleSort(col){
  if(S.sortCol===col){ S.sortDir=S.sortDir==="asc"?"desc":"asc"; }
  else{ S.sortCol=col; S.sortDir="asc"; }
  go();
}
function thSort(col,label){
  const cls=S.sortCol===col?(S.sortDir==="asc"?"sort-asc":"sort-desc"):"";
  return `<th class="${cls}" onclick="toggleSort('${col}')">${label}</th>`;
}
function sortList(list){
  if(!S.sortCol) return list;
  return [...list].sort((a,b)=>{
    if(S.sortCol==="pct"){ const av=pct(a),bv=pct(b); return S.sortDir==="asc"?av-bv:bv-av; }
    let av=a[S.sortCol]||"",bv=b[S.sortCol]||"";
    return S.sortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
  });
}
function exportCSV(){
  const active=S.refs.filter(r=>r.status==="active");
  const cols=["first_name","last_name","dob","caregiver","caregiver_phone","caregiver_email","office","insurance","insurance_verified","autism_diagnosis","intake_paperwork","intake_personnel","referral_form","permission_assessment","vineland","srs2","attends_school","iep_report","contact1","contact2","contact3","date_received","notes","status"];
  const csv=[cols.join(","),...active.map(r=>cols.map(c=>'"'+(r[c]||"").replace(/"/g,'""')+'"').join(","))].join("\n");
  const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([csv],{type:"text/csv"})),download:"bsom_referrals.csv"});
  a.click();
}

function renderPage(active,nr){
  if(S.loading||S.seeding) return `<div class="loader-wrap"><div class="spinner"></div><div style="color:var(--muted)">${S.seeding?"Seeding records…":"Connecting…"}</div></div>`;
  const mod=S.module, sub=S.subpage;
  if(mod==="dashboard") return renderDashboard(active,nr);
  if(mod==="intake"){
    if(sub==="all") return renderAllReferrals(active);
    if(sub==="new") return renderNewReferral();
    if(sub==="nr")  return renderNR(nr);
  }
  if(mod==="assessment") return renderAssessments(active);
  if(mod==="operations"){
    if(sub==="overview")  return renderOpsOverview(active);
    if(sub==="staff")     return renderByStaff(active);
    if(sub==="office")    return renderByOffice(active);
    if(sub==="trends")    return renderTrends(active);
    if(sub==="insurance") return renderInsurance(active);
  }
  if(mod==="about"){
    if(sub==="locations") return renderLocations();
    if(sub==="versions")  return renderVersions();
  }
  return "";
}

function renderAssessments(active){
  const fields=[
    ["Permission","permission_assessment"],
    ["Vineland","vineland"],
    ["SRS-2","srs2"],
    ["IEP Report","iep_report"],
    ["Autism DX","autism_diagnosis"],
  ];
  let fl=active.filter(r=>{
    const n=`${r.first_name} ${r.last_name}`.toLowerCase();
    return n.includes(S.assessSearch.toLowerCase())
        && (S.assessOffice==="ALL"||normalizeOffice(r.office)===S.assessOffice||r.office===S.assessOffice);
  });

  const complete=fl.filter(r=>fields.every(([,k])=>{const v=(r[k]||"").toUpperCase();return["YES","COMPLETED","SIGNED","RECEIVED"].some(x=>v.includes(x))}));
  const inProgress=fl.filter(r=>!fields.every(([,k])=>{const v=(r[k]||"").toUpperCase();return["YES","COMPLETED","SIGNED","RECEIVED"].some(x=>v.includes(x))}));

  return `
    <div class="stats-row stats-3" style="margin-bottom:20px">
      <div class="stat-box"><div class="stat-num" style="color:#6366f1">${fl.length}</div><div class="stat-label">Total Clients</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#22c55e">${complete.length}</div><div class="stat-label">All Assessments Complete</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#f59e0b">${inProgress.length}</div><div class="stat-label">In Progress</div></div>
    </div>
    <div class="filter-row">
      <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" placeholder="Search client..." value="${S.assessSearch}" oninput="S.assessSearch=this.value;go()"></div>
      <div class="filter-btns">${["ALL",...OFFICES].map(o=>`<button class="filter-btn ${S.assessOffice===o?"active":""}" onclick="S.assessOffice='${o}';go()">${o}</button>`).join("")}</div>
    </div>
    <div class="card"><div class="table-wrap"><table>
      <thead>
        <tr>
          <th>Client</th><th>Office</th><th>Personnel</th>
          ${fields.map(([l])=>`<th>${l}</th>`).join("")}
          <th>Overall</th>
        </tr>
      </thead>
      <tbody>
        ${fl.length===0?`<tr><td colspan="${5+fields.length}" style="padding:56px;text-align:center;color:var(--dim)">No clients found.</td></tr>`:fl.map(r=>`
        <tr class="row-hover" onclick="S.sel='${r.id}';S.module='intake';S.subpage='all';S.editMode=false;go()">
          <td><div style="font-weight:700">${r.first_name} ${r.last_name}</div><div style="font-size:11px;color:var(--dim)">${r.dob||""}</div></td>
          <td>${officeLabel(r.office)}</td>
          <td style="font-size:12px;color:var(--muted)">${r.intake_personnel||"—"}</td>
          ${fields.map(([,k])=>`<td>${bdg(r[k])}</td>`).join("")}
          <td>${ring(pct(r))}</td>
        </tr>`).join("")}
      </tbody>
    </table></div></div>`;
}

function barChart(items,color="#6366f1"){
  const max=Math.max(...items.map(i=>i.v),1);
  return `<div class="bar-chart">${items.map(i=>`
    <div class="bar-row">
      <span class="bar-label">${i.l}</span>
      <div class="bar-track">
        <div class="bar-fill" style="width:${Math.round(i.v/max*100)}%;background:${i.color||color}">
          <span class="bar-val">${i.v}</span>
        </div>
      </div>
    </div>`).join("")}</div>`;
}

function renderOpsOverview(active){
  const byOffice=OFFICES.map(o=>{const v=active.filter(r=>normalizeOffice(r.office)===o).length;return{l:o,v};});
  const byStaff=STAFF.filter(s=>s!=="Other").map(s=>{const v=active.filter(r=>r.intake_personnel===s).length;return{l:s,v};}).filter(x=>x.v>0);
  const paperwork=[
    {l:"Signed",v:active.filter(r=>(r.intake_paperwork||"").toLowerCase().includes("signed")).length,color:"#22c55e"},
    {l:"Emailed via Adobe",v:active.filter(r=>(r.intake_paperwork||"").toLowerCase().includes("emailed")).length,color:"#f59e0b"},
    {l:"Please Send",v:active.filter(r=>(r.intake_paperwork||"").toLowerCase().includes("please")).length,color:"#ef4444"},
    {l:"Awaiting",v:active.filter(r=>(r.intake_paperwork||"").toLowerCase().includes("awaiting")).length,color:"#fb923c"},
  ].filter(x=>x.v>0);
  return `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
      <div class="card card-pad"><div class="chart-title">Referrals by Office</div>${barChart(byOffice,"#6366f1")}</div>
      <div class="card card-pad"><div class="chart-title">Referrals by Staff Member</div>${barChart(byStaff,"#22c55e")}</div>
      <div class="card card-pad" style="grid-column:1/-1"><div class="chart-title">Paperwork Status Breakdown</div>${barChart(paperwork)}</div>
    </div>`;
}

      const signed=clients.filter(r=>(r.intake_paperwork||"").toLowerCase().includes("signed")).length;
      return `<div class="card card-pad">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="font-weight:700;font-size:15px">${s}</div>

            <span class="bdg" style="background:#6366f120;color:#a5b4fc;border:1px solid #6366f130">${clients.length} clients</span>

          </div>
        </div>
        <div class="bar-chart">
          ${[["Signed","#22c55e"],["Pending","#f59e0b"],["Non-Responsive","#ef4444"]].map(([l,c])=>{
            const count=l==="Signed"?signed:l==="Pending"?clients.filter(r=>!["signed","completed"].includes((r.intake_paperwork||"").toLowerCase())).length:0;
            return `<div class="bar-row"><span class="bar-label">${l}</span><div class="bar-track"><div class="bar-fill" style="width:${clients.length?Math.round(count/clients.length*100):0}%;background:${c}"><span class="bar-val">${count}</span></div></div></div>`;
          }).join("")}
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

function renderByOffice(active){
  return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    ${OFFICES.map(o=>{
      const clients=active.filter(r=>normalizeOffice(r.office)===o);
      const signed=clients.filter(r=>(r.intake_paperwork||"").toLowerCase().includes("signed")).length;
      const avgP=clients.length?Math.round(clients.reduce((s,r)=>s+pct(r),0)/clients.length):0;
      return `<div class="card card-pad">
        <div style="display:flex;justify-content:space-between;margin-bottom:14px">
          <div style="font-weight:700;font-size:14px">${o}</div>
          <span class="office-pill">${clients.length} clients</span>
        </div>
        <div class="info-row"><span class="info-label">Fully signed</span><span style="color:#22c55e;font-weight:700">${signed}</span></div>
        <div class="info-row"><span class="info-label">Avg completion</span><span style="color:#6366f1;font-weight:700">${avgP}%</span></div>
        <div class="info-row" style="border:none"><span class="info-label">Staff</span><span style="font-size:12px;color:var(--muted)">${[...new Set(clients.map(r=>r.intake_personnel).filter(Boolean))].join(", ")||"—"}</span></div>
      </div>`;
    }).join("")}
  </div>`;
}

function renderTrends(active){
  const byMonth={};
  active.forEach(r=>{
    if(!r.date_received) return;
    const key=r.date_received.slice(0,7);
    byMonth[key]=(byMonth[key]||0)+1;
  });
  const months=Object.keys(byMonth).sort();
  const items=months.map(m=>{
    const [y,mo]=m.split("-");
    const label=new Date(y,parseInt(mo)-1).toLocaleString("default",{month:"short",year:"2-digit"});
    return {l:label,v:byMonth[m],color:"#6366f1"};
  });
  return `<div class="card card-pad"><div class="chart-title">Monthly Intake Trends</div>
    ${items.length?barChart(items,"#6366f1"):`<div style="color:var(--dim);text-align:center;padding:40px">No date data available.</div>`}
  </div>`;
}

function renderInsurance(active){
  const counts={};
  active.forEach(r=>{if(r.insurance)counts[r.insurance]=(counts[r.insurance]||0)+1;});
  const colors=["#6366f1","#22c55e","#f59e0b","#fb923c","#ef4444","#8b5cf6","#06b6d4","#ec4899","#a3e635","#f97316"];
  const items=Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([l,v],i)=>{return{l,v,color:colors[i%colors.length]}});
  return `<div class="card card-pad"><div class="chart-title">Insurance Type Breakdown</div>
    ${barChart(items)}
    <div style="margin-top:20px;display:flex;flex-wrap:wrap;gap:10px">
      ${items.map(i=>`<div class="legend-item"><div class="legend-dot" style="background:${i.color}"></div>${i.l} (${i.v})</div>`).join("")}
    </div>
  </div>`;
}

  const offices=[

      ${offices.map(o=>`

      <div style="font-weight:700;color:#f59e0b;margin-bottom:8px">📋 Office Consolidation Notes</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.7">

        • <strong style="color:var(--text)">Jackson Clinic</strong> has been consolidated into the Flowood office. Records show legacy assignment for documentation purposes.<br>

      </div>

}

function renderVersions(){
  const versions=[
    {v:"v04",date:"2026-04",note:"Multi-module portal architecture. Added Dashboard, Initial Assessments, Operations & Insights, About modules. Office consolidation (Newton→Forest, Jackson→Flowood, School→Day Treatment). Legacy migration badges added."},
    {v:"v03",date:"2026-03",note:"Added BSOM logo, edit mode in modal, CSV export, role-based view, sortable columns, restore active from non-responsive, office rename to Day Treatment."},
    {v:"v02",date:"2026-03",note:"Fresh rebuild from v01. Improved dark theme, progress rings, color-coded badges, 4-step new referral form, detail modal, non-responsive tracking. Supabase integration."},
    {v:"v01",date:"2026-03",note:"Initial intake tracker build. Basic referral table, status badges, Supabase seed data for 13 active referrals."},
  ];
  return `
    <div style="margin-bottom:20px"><div style="font-weight:800;font-size:18px">Version History</div><div style="color:var(--muted);font-size:13px;margin-top:4px">BSOM Intake Portal release notes</div></div>
    <div class="about-card">
      ${versions.map((ver,i)=>`
        <div class="version-row" style="${i===versions.length-1?"border:none":""}">
          <div style="flex:1;padding-right:20px">
            <div style="font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:10px">
              <span class="version-tag">${ver.v}</span>
              ${i===0?`<span style="background:#22c55e20;color:#22c55e;border:1px solid #22c55e30;border-radius:6px;padding:1px 8px;font-size:10px;font-weight:700">Current</span>`:""}
            </div>
            <div style="font-size:12px;color:var(--muted);margin-top:6px;line-height:1.6">${ver.note}</div>
          </div>
          <div style="font-size:11px;color:var(--dim);font-family:'DM Mono',monospace;flex-shrink:0">${ver.date}</div>
        </div>`).join("")}
