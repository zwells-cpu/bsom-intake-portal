}

// ══════════════════════════════════════
// MODAL (shared, accessible from any module)
// ══════════════════════════════════════
function renderModal(){
  const r=S.refs.find(x=>x.id===S.sel); if(!r) return "";
  const e=S.editMode?S.editForm:r;
  const ckFields=[
    ["Referral Form","referral_form",BOOL],
    ["Permission for Assessment","permission_assessment",STAT],
    ["Vineland","vineland",STAT],["SRS-2","srs2",STAT],
    ["Attends School","attends_school",BOOL],["IEP Report","iep_report",BOOL],
    ["Autism Diagnosis Docs","autism_diagnosis",["Received","Requested","Awaiting","N/A"]],
    ["Intake Paperwork","intake_paperwork",["Signed","Emailed via Adobe","Awaiting","N/A"]]
  ];
  const eOpt=(key,val,opts)=>`<div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">${opts.map(o=>{const c=sc(o);const a=val===o;return`<button class="edit-opt" onclick="S.editForm['${key}']='${o}';go()" style="border-color:${a?c:"var(--border)"};background:${a?c+"22":"var(--bg)"};color:${a?c:"var(--dim)"}">${o}</button>`;}).join("")}</div>`;
  const eText=(key,val,ph="")=>`<input class="edit-input" value="${(val||"").replace(/"/g,"&quot;")}" oninput="S.editForm['${key}']=this.value" placeholder="${ph}">`;
  const eSel=(key,val,opts)=>`<select class="edit-select" onchange="S.editForm['${key}']=this.value">${opts.map(o=>`<option ${val===o?"selected":""}>${o}</option>`).join("")}</select>`;
  const eDate=(key,val)=>`<input type="date" class="edit-input" value="${val||""}" oninput="S.editForm['${key}']=this.value">`;

  const footLeft=r.status==="active"?`
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-ghost" onclick="setStatus('${r.id}','non-responsive')" style="color:#ef4444;border-color:#ef444440;font-size:12px">Mark Non-Responsive</button>
      <button class="btn-ghost" onclick="setStatus('${r.id}','referred-out')" style="color:#8b5cf6;border-color:#8b5cf640;font-size:12px">Referred Out</button>
    </div>`:`<button onclick="setStatus('${r.id}','active')" style="padding:8px 16px;border-radius:8px;border:1px solid #22c55e40;background:#22c55e15;color:#22c55e;font-size:12px;font-weight:700;cursor:pointer">↩ Restore Active</button>`;

  return `<div class="overlay" onclick="S.sel=null;S.editMode=false;go()"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <div>
        <div class="modal-title">${r.first_name} ${r.last_name}</div>
        <div class="modal-sub">DOB: ${r.dob||"—"} · Received: ${r.date_received||"—"} · ${normalizeOffice(r.office)||""}${(r.office==="NEWTON"||r.office==="JACKSON")?` <span style="color:#f59e0b;font-size:11px">(prev. ${r.office})</span>`:""}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        ${ring(pct(r))}
        <button class="btn-edit ${S.editMode?"editing":""}" onclick="if(!S.editMode){S.editForm=Object.assign({},S.refs.find(x=>x.id===S.sel));S.editMode=true;go();}else{S.editMode=false;go();}">${S.editMode?"✏ Editing":"✏ Edit Record"}</button>
        <button class="close-btn" onclick="S.sel=null;S.editMode=false;go()">×</button>
      </div>
    </div>
    <div class="modal-body">
      <div>
        <div class="section-hdr">Caregiver</div>
        ${S.editMode
          ?`<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px"><div><div class="label">Name</div>${eText("caregiver",e.caregiver,"Full Name")}</div><div><div class="label">Phone</div>${eText("caregiver_phone",e.caregiver_phone,"601-000-0000")}</div><div><div class="label">Email</div>${eText("caregiver_email",e.caregiver_email,"email@example.com")}</div></div>`
          :`${[["Name",r.caregiver],["Phone",r.caregiver_phone],["Email",r.caregiver_email]].map(([l,v])=>`<div style="margin-bottom:12px"><div class="label">${l}</div><div style="color:#cbd5e1;font-size:14px">${v||"—"}</div></div>`).join("")}`}
        <div class="section-hdr" style="margin-top:4px">Insurance</div>
        ${S.editMode
          ?`<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:4px"><div class="info-row"><span class="info-label">Primary</span>${eSel("insurance",e.insurance,INSURANCES)}</div><div class="info-row"><span class="info-label">Secondary</span>${eSel("secondary_insurance",e.secondary_insurance,["None",...INSURANCES])}</div><div class="info-row"><span class="info-label">Verified</span>${eOpt("insurance_verified",e.insurance_verified,BOOL)}</div></div>`
          :`<div class="info-row"><span class="info-label">Primary</span><span class="info-val">${r.insurance||"—"}</span></div><div class="info-row"><span class="info-label">Secondary</span><span class="info-val">${r.secondary_insurance||"—"}</span></div><div class="info-row"><span class="info-label">Verified</span>${bdg(r.insurance_verified)}</div>`}
        <div class="section-hdr" style="margin-top:16px">Contact Log</div>
        ${S.editMode
          ?`<div style="display:flex;flex-direction:column;gap:8px">${[["contact1","1st"],["contact2","2nd"],["contact3","3rd"]].map(([k,l])=>`<div class="info-row"><span class="info-label">${l} Contact</span>${eDate(k,e[k])}</div>`).join("")}</div>`
          :`${[["1st",r.contact1],["2nd",r.contact2],["3rd",r.contact3]].map(([l,v])=>`<div class="info-row"><span class="info-label">${l} Contact</span><span class="${v?"contact-val":"info-val"}">${v||"—"}</span></div>`).join("")}`}
        ${S.editMode?`<div style="margin-top:12px"><div class="label">Date Received</div>${eDate("date_received",e.date_received)}</div><div style="margin-top:10px"><div class="label">Office</div>${eSel("office",e.office,OFFICES)}</div>`:""}
      </div>
      <div>
        <div class="section-hdr">Intake Checklist</div>
        ${ckFields.map(([l,key,opts])=>`<div class="info-row"><span class="info-label">${l}</span>${S.editMode?eOpt(key,e[key],opts):bdg(r[key])}</div>`).join("")}
        <div style="margin-top:14px"><div class="label">Intake Personnel</div>
          ${S.editMode?eSel("intake_personnel",e.intake_personnel,STAFF):`<div style="color:#a5b4fc;font-weight:700;font-size:15px;margin-top:4px">${r.intake_personnel||"—"}</div>`}
        </div>
        ${S.editMode?`<div style="margin-top:14px"><div class="label">Notes</div><textarea class="edit-input" rows="3" oninput="S.editForm.notes=this.value" style="resize:vertical">${e.notes||""}</textarea></div>`:(r.notes?`<div style="margin-top:12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px"><div class="label" style="margin-bottom:6px">Notes</div><div style="color:var(--muted);font-size:13px">${r.notes}</div></div>`:"")}
      </div>
    </div>
    <div class="modal-foot">
      ${footLeft}
      <div style="display:flex;gap:8px">
        ${S.editMode
          ?`<button class="btn-ghost" onclick="S.editMode=false;go()">Cancel</button><button class="btn-save" onclick="saveEdit()" ${S.updatingSel?"disabled":""}>${S.updatingSel?"Saving…":"💾 Save Changes"}</button>`
          :`<button class="btn-primary" onclick="S.sel=null;go()">Close</button>`}
      </div>
    </div>
  </div></div>`;
}

load();
</script>
