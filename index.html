<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BSOM Intake Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080e1a;
    --surface: #0d1526;
    --surface2: #111d33;
    --border: #1a2840;
    --border2: #243450;
    --text: #e2eaf8;
    --muted: #94a3b8;
    --dim: #4a607a;
    --accent: #6366f1;
    --accent2: #8b5cf6;
    --green: #22c55e;
    --yellow: #f59e0b;
    --orange: #fb923c;
    --red: #ef4444;
  }
  body { background: var(--bg); color: var(--text); font-family: "DM Sans", system-ui, sans-serif; min-height: 100vh; font-size: 14px; line-height: 1.5; }
  input, select, textarea, button { outline: none; font-family: inherit; }
  input::placeholder, textarea::placeholder { color: var(--dim); }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* Nav */
  .nav { border-bottom: 1px solid var(--border); padding: 0 32px; background: var(--surface); }
  .nav-inner { max-width: 1300px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; gap: 16px; }
  .nav-brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .nav-logo { width: 40px; height: 40px; border-radius: 10px; overflow: hidden; background: white; display: flex; align-items: center; justify-content: center; }
  .nav-logo img { width: 40px; height: 40px; object-fit: contain; }
  .nav-title { font-weight: 800; font-size: 14.5px; letter-spacing: -0.01em; }
  .nav-sub { font-size: 11px; color: var(--dim); font-weight: 500; }
  .nav-tabs { display: flex; gap: 2px; }
  .nav-tab { background: transparent; border: 1px solid transparent; border-radius: 8px; padding: 7px 15px; color: var(--dim); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .nav-tab:hover { color: var(--muted); }
  .nav-tab.active { background: var(--surface2); border-color: var(--border2); color: var(--text); font-weight: 600; }
  .nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .badge-active { background: #22c55e18; color: var(--green); border: 1px solid #22c55e30; border-radius: 20px; padding: 4px 13px; font-size: 12px; font-weight: 700; white-space: nowrap; }
  .btn-refresh { background: transparent; border: 1px solid var(--border2); border-radius: 8px; padding: 6px 13px; color: var(--muted); font-size: 12px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
  .role-select { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 5px 10px; color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer; }

  .main { max-width: 1300px; margin: 0 auto; padding: 28px 32px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; }
  .input-field { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 13.5px; width: 100%; transition: border-color 0.2s; }
  .input-field:focus { border-color: var(--accent); }
  select option { background: var(--surface); }
  .label { font-size: 11px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; display: block; }
  .section-hdr { font-size: 11.5px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

  /* Buttons */
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border: none; border-radius: 9px; padding: 10px 22px; font-weight: 700; font-size: 13.5px; cursor: pointer; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-ghost { background: transparent; border: 1px solid var(--border2); border-radius: 9px; padding: 9px 18px; color: var(--muted); font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-save { background: linear-gradient(135deg, var(--green), #16a34a); color: white; border: none; border-radius: 9px; padding: 10px 24px; font-weight: 700; font-size: 13.5px; cursor: pointer; }
  .btn-export { background: transparent; border: 1px solid var(--border2); border-radius: 8px; padding: 7px 14px; color: var(--muted); font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.15s; }
  .btn-export:hover { border-color: var(--green); color: var(--green); }
  .btn-edit { background: #6366f115; border: 1px solid #6366f130; border-radius: 8px; padding: 6px 14px; color: #a5b4fc; font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.15s; }
  .btn-edit:hover { background: #6366f125; }
  .btn-edit.active { background: #f59e0b20; border-color: #f59e0b40; color: #f59e0b; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 13px; padding: 18px 22px; }
  .stat-num { font-size: 30px; font-weight: 800; font-family: "DM Mono", monospace; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; }

  /* Filters */
  .filter-row { display: flex; gap: 10px; margin-bottom: 18px; align-items: center; flex-wrap: wrap; }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--dim); font-size: 13px; pointer-events: none; }
  .search-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px 8px 30px; color: var(--text); font-size: 13px; width: 240px; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--dim); }
  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { padding: 7px 13px; border-radius: 7px; border: 1px solid var(--border); background: transparent; color: var(--dim); font-size: 11.5px; font-weight: 700; cursor: pointer; letter-spacing: 0.04em; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--border2); color: var(--muted); }
  .filter-btn.active { border-color: var(--accent); background: #6366f115; color: #a5b4fc; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 11px 14px; text-align: left; font-size: 10.5px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; transition: color 0.15s; }
  th:hover { color: var(--muted); }
  th.sort-asc::after { content: " ↑"; color: var(--accent); }
  th.sort-desc::after { content: " ↓"; color: var(--accent); }
  td { padding: 10px 14px; border-bottom: 1px solid #0a1525; vertical-align: middle; }
  .row-hover { cursor: pointer; transition: background 0.12s; }
  .row-hover:hover { background: #ffffff05; }
  .client-name { font-weight: 700; color: var(--text); }
  .client-date { font-size: 11px; color: var(--dim); margin-top: 2px; }
  .caregiver-name { color: #cbd5e1; }
  .caregiver-phone { font-size: 11px; color: var(--dim); margin-top: 2px; font-family: "DM Mono", monospace; }
  .office-pill { background: var(--surface2); border-radius: 6px; padding: 3px 9px; font-size: 11px; font-weight: 700; color: var(--muted); display: inline-block; }
  .ins-text { color: var(--muted); font-size: 12px; }
  .arrow-btn { color: var(--accent); font-weight: 700; font-size: 16px; opacity: 0.7; }

  /* Badge */
  .bdg { border-radius: 6px; padding: 2px 9px; font-size: 11px; font-weight: 700; white-space: nowrap; font-family: "DM Mono", monospace; display: inline-block; }

  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.72); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(5px); animation: fadeIn 0.18s ease; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 18px; max-width: 860px; width: 100%; max-height: 90vh; overflow-y: auto; animation: slideUp 0.2s ease; }
  .modal-head { padding: 22px 28px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .modal-title { font-weight: 800; font-size: 22px; letter-spacing: -0.02em; }
  .modal-sub { color: var(--muted); font-size: 12.5px; margin-top: 4px; }
  .modal-body { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding: 22px 28px; }
  .modal-foot { padding: 14px 28px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .close-btn { background: var(--surface2); border: none; color: var(--muted); border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 18px; line-height: 1; transition: all 0.15s; }
  .close-btn:hover { color: var(--text); }
  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #0a1525; gap: 8px; }
  .info-label { font-size: 12.5px; color: var(--muted); flex-shrink: 0; }
  .info-val { font-size: 12.5px; color: #94a3b8; }
  .contact-val { font-family: "DM Mono", monospace; font-size: 12px; color: #a5b4fc; }

  /* Edit mode fields inside modal */
  .edit-input { background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; padding: 5px 9px; color: var(--text); font-size: 12.5px; width: 100%; transition: border-color 0.2s; }
  .edit-input:focus { border-color: var(--accent); }
  .edit-select { background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; padding: 4px 8px; color: var(--text); font-size: 12px; cursor: pointer; }
  .edit-opt { padding: 3px 9px; border-radius: 5px; border: 1px solid var(--border); background: var(--bg); color: var(--dim); font-weight: 600; font-size: 11px; cursor: pointer; transition: all 0.12s; }

  /* New Referral */
  .stepper { display: flex; align-items: center; margin-bottom: 32px; }
  .step-dot-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .step-dot { width: 28px; height: 28px; border-radius: 50%; border: none; color: white; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .step-dot.done { background: var(--green); }
  .step-dot.current { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .step-dot.future { background: var(--surface2); color: var(--dim); cursor: default; }
  .step-label { font-size: 11px; font-weight: 600; white-space: nowrap; }
  .step-line { flex: 1; height: 1px; margin: 0 8px; margin-bottom: 20px; transition: background 0.3s; }
  .checklist-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--bg); flex-wrap: wrap; gap: 8px; }
  .opt-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--dim); font-weight: 600; font-size: 12px; cursor: pointer; transition: all 0.15s; }

  /* NR table */
  .nr-table td { color: var(--muted); }

  /* Toast / Error */
  .toast { position: fixed; bottom: 28px; right: 28px; background: var(--green); color: white; border-radius: 12px; padding: 14px 22px; font-weight: 700; font-size: 14px; z-index: 200; box-shadow: 0 8px 32px rgba(34,197,94,0.3); animation: slideUpToast 0.3s ease; }
  .error-bar { background: #ef444418; border: 1px solid #ef444435; color: var(--red); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
  .x-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 16px; }

  /* Loader */
  .loader-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 18px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes slideUpToast { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
</head>

async function db(method,path,body){
  const r = await fetch(SB_URL+"/rest/v1/"+path,{
    method,
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json","Prefer":"return=representation"},
    body: body?JSON.stringify(body):undefined
  });
  const t = await r.text();
  if(!r.ok) throw new Error(t);
  return t?JSON.parse(t):[];
}

async function load(){
  try{
    S.loading=true; go();
    const d = await db("GET","referrals?order=created_at.desc");
    if(d.length===0){
      S.seeding=true; go();
      for(const r of SEED) await db("POST","referrals",r);
      S.refs = await db("GET","referrals?order=created_at.desc");
      S.seeding=false;
    } else S.refs=d;
    S.error=null;
  } catch(e){ S.error="Could not connect to database. Check your connection and refresh."; }
  finally{ S.loading=false; go(); }
}

async function save(){
  S.saving=true; go();
  try{
    const r = await db("POST","referrals",S.form);
    S.refs=[r[0],...S.refs]; S.form=ef(); S.step=0; S.saving=false; S.saved=true; go();
    setTimeout(()=>{ S.saved=false; S.tab=1; go(); },1800);
  } catch(e){ S.error="Could not save referral. Please try again."; S.saving=false; go(); }
}

async function saveEdit(){
  const id = S.sel;
  S.updatingSel=true; go();
  try{
    const patch = Object.assign({},S.editForm);
    delete patch.id; delete patch.created_at;
    await db("PATCH","referrals?id=eq."+id,patch);
    S.refs = S.refs.map(r=>r.id===id?{...r,...patch}:r);
    S.editMode=false; S.updatingSel=false; go();
  } catch(e){ S.error="Could not save changes."; S.updatingSel=false; go(); }
}

async function setStatus(id,status){
  try{
    await db("PATCH","referrals?id=eq."+id,{status});
    S.refs=S.refs.map(r=>r.id===id?{...r,status}:r);
    S.sel=null; S.editMode=false; go();
  } catch(e){ S.error="Could not update record."; go(); }
}

async function restoreActive(id){
  await setStatus(id,"active");
}

// ── Color logic ──
function sc(v){
  if(!v||v==="N/A") return "#64748b";
  const u=v.toUpperCase();
  if(["COMPLETED","SIGNED","YES","RECEIVED"].some(x=>u.includes(x))) return "#22c55e";
  if(["EMAILED","REMINDER","TOO YOUNG"].some(x=>u.includes(x)))       return "#f59e0b";
  if(["AWAITING","REQUESTED"].some(x=>u.includes(x)))                 return "#fb923c";
  if(u==="NO"||u.includes("PLEASE"))                                   return "#ef4444";
  return "#64748b";
}

function bdg(v){
  const c=sc(v);
  return `<span class="bdg" style="background:${c}20;color:${c};border:1px solid ${c}38">${v||"—"}</span>`;
}

function pct(r){
  const fs=["referral_form","permission_assessment","vineland","srs2","insurance_verified","autism_diagnosis","intake_paperwork","intake_personnel"];
  const done=fs.filter(f=>{ const v=(r[f]||"").toUpperCase(); return["YES","COMPLETED","SIGNED","RECEIVED"].some(x=>v.includes(x)); });
  return Math.round(done.length/fs.length*100);
}

function ring(p){
  const radius=18,circ=2*Math.PI*radius;
  const col=p>=80?"#22c55e":p>=50?"#f59e0b":"#ef4444";
  return `<svg width="44" height="44" viewBox="0 0 44 44">
    <circle cx="22" cy="22" r="${radius}" fill="none" stroke="#1a2840" stroke-width="4"/>
    <circle cx="22" cy="22" r="${radius}" fill="none" stroke="${col}" stroke-width="4"
      stroke-dasharray="${p/100*circ} ${circ}" stroke-linecap="round" transform="rotate(-90 22 22)"/>
    <text x="22" y="26" text-anchor="middle" font-size="10" font-weight="700" fill="${col}" font-family="DM Mono,monospace">${p}%</text>
  </svg>`;
}

// ── Sorting ──
function sortRefs(list){
  if(!S.sortCol) return list;
  return [...list].sort((a,b)=>{
    let av=a[S.sortCol]||"", bv=b[S.sortCol]||"";
    if(S.sortCol==="pct"){ av=pct(a); bv=pct(b); return S.sortDir==="asc"?av-bv:bv-av; }
    return S.sortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
  });
}

function thSort(col,label){
  const active=S.sortCol===col;
  const cls=active?(S.sortDir==="asc"?"sort-asc":"sort-desc"):"";
  return `<th class="${cls}" onclick="toggleSort('${col}')">${label}</th>`;
}

function toggleSort(col){
  if(S.sortCol===col){ S.sortDir=S.sortDir==="asc"?"desc":"asc"; }
  else{ S.sortCol=col; S.sortDir="asc"; }
  go();
}

// ── CSV Export ──
function exportCSV(){
  const active=S.refs.filter(r=>r.status==="active");
  const cols=["first_name","last_name","dob","caregiver","caregiver_phone","caregiver_email","office","insurance","insurance_verified","autism_diagnosis","intake_paperwork","intake_personnel","referral_form","permission_assessment","vineland","srs2","attends_school","iep_report","contact1","contact2","contact3","date_received","notes","status"];
  const header=cols.join(",");
  const rows=active.map(r=>cols.map(c=>'"'+(r[c]||"").replace(/"/g,'""')+'"').join(","));
  const csv=[header,...rows].join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="bsom_active_referrals.csv"; a.click();
  URL.revokeObjectURL(url);
}

  let fl=active.filter(r=>{

  return `

          <select class="role-select" onchange="S.role=this.value;go()">
            ${ALL_ROLES.map(r=>`<option ${S.role===r?"selected":""}>${r}</option>`).join("")}

     <div class="section-hdr">👨‍👩‍👦 Caregiver</div>
     <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px">
       <div><label class="label">Name</label><input class="input-field" value="${f.caregiver}" oninput="S.form.caregiver=this.value" placeholder="Full Name"></div>
       <div><label class="label">Phone</label><input class="input-field" value="${f.caregiver_phone}" oninput="S.form.caregiver_phone=this.value" placeholder="601-000-0000"></div>
       <div><label class="label">Email</label><input class="input-field" value="${f.caregiver_email}" oninput="S.form.caregiver_email=this.value" placeholder="email@example.com"></div>
     </div>
     <div><label class="label">Office</label><select class="input-field" onchange="S.form.office=this.value"><option value="">Select Office</option>${OFFICES.map(o=>`<option ${f.office===o?"selected":""}>${o}</option>`).join("")}</select></div>`,

    `<div class="section-hdr">🏥 Insurance</div>
     <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
       <div><label class="label">Primary</label><select class="input-field" onchange="S.form.insurance=this.value"><option value="">Select</option>${INSURANCES.map(i=>`<option ${f.insurance===i?"selected":""}>${i}</option>`).join("")}</select></div>
       <div><label class="label">Secondary</label><select class="input-field" onchange="S.form.secondary_insurance=this.value"><option value="">None</option>${INSURANCES.map(i=>`<option ${f.secondary_insurance===i?"selected":""}>${i}</option>`).join("")}</select></div>
     </div>
     <div><label class="label">Insurance Docs Verified</label>
       <div style="display:flex;gap:8px;margin-top:8px">
         ${BOOL.map(o=>{ const c=sc(o); const a=f.insurance_verified===o;
           return `<button onclick="S.form.insurance_verified='${o}';go()" style="padding:8px 20px;border-radius:8px;border:1px solid ${a?c:"var(--border)"};background:${a?c+"22":"var(--bg)"};color:${a?c:"var(--dim)"};font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;transition:all 0.15s">${o}</button>`;
         }).join("")}
       </div>
     </div>`,

    `<div class="section-hdr">📋 Referral Source</div>
     <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
       <div><label class="label">Agency / Clinic</label><input class="input-field" value="${f.referral_source}" oninput="S.form.referral_source=this.value" placeholder="Agency Name"></div>
       <div><label class="label">Point of Contact</label><input class="input-field" value="${f.point_of_contact}" oninput="S.form.point_of_contact=this.value" placeholder="Contact Person"></div>
       <div><label class="label">Phone</label><input class="input-field" value="${f.referral_source_phone}" oninput="S.form.referral_source_phone=this.value" placeholder="601-000-0000"></div>
       <div><label class="label">Fax</label><input class="input-field" value="${f.referral_source_fax}" oninput="S.form.referral_source_fax=this.value" placeholder="601-000-0000"></div>
     </div>
     <div style="margin-bottom:16px"><label class="label">Provider / NPI #</label><input class="input-field" value="${f.provider_npi}" oninput="S.form.provider_npi=this.value" placeholder="Provider Name and NPI"></div>
     <div><label class="label">Reason for Referral (ICD-10)</label><textarea class="input-field" rows="4" oninput="S.form.reason_for_referral=this.value" style="resize:vertical" placeholder="e.g. Safety Risk, SIB, elopement. F84.0">${f.reason_for_referral}</textarea></div>`,

    `<div class="section-hdr">✅ Intake Checklist</div>
     ${cl.map(([label,key,opts])=>`
       <div class="checklist-row">
         <span style="font-size:13.5px;color:#cbd5e1">${label}</span>
         <div style="display:flex;gap:6px;flex-wrap:wrap">
           ${opts.map(o=>{ const c=sc(o); const a=f[key]===o;
             return `<button class="opt-btn" onclick="S.form['${key}']='${o}';go()" style="border-color:${a?c:"var(--border)"};background:${a?c+"22":"var(--bg)"};color:${a?c:"var(--dim)"}">${o}</button>`;
           }).join("")}
         </div>
       </div>`).join("")}
     <div style="margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px">
       <div>
         <label class="label">Contact Attempts</label>
         <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
           ${[["contact1","1st"],["contact2","2nd"],["contact3","3rd"]].map(([k,l])=>`
             <div>
               <div style="font-size:11px;color:var(--dim);margin-bottom:4px">${l}</div>
               <input type="date" class="input-field" value="${f[k]}" oninput="S.form['${k}']=this.value" style="font-size:12px;padding:7px 8px">
             </div>`).join("")}
         </div>
       </div>
       <div><label class="label">Intake Personnel</label><select class="input-field" onchange="S.form.intake_personnel=this.value"><option value="">Select Staff</option>${STAFF.map(p=>`<option ${f.intake_personnel===p?"selected":""}>${p}</option>`).join("")}</select></div>
     </div>
     <div style="margin-top:16px"><label class="label">Notes</label><textarea class="input-field" rows="3" oninput="S.form.notes=this.value" style="resize:vertical" placeholder="Additional notes…">${f.notes}</textarea></div>`
  ];

  return `
    <div style="max-width:720px;margin:0 auto">
      <div class="stepper">
        ${steps.map(([icon,label],i)=>`
          <div style="display:flex;align-items:center;${i<steps.length-1?"flex:1":""}">
            <div class="step-dot-wrap">
              <button class="step-dot ${S.step===i?"current":S.step>i?"done":"future"}"
                onclick="if(${i}<=S.step){S.step=${i};go()}">${S.step>i?"✓":icon}</button>
              <span class="step-label" style="color:${S.step===i?"#a5b4fc":"var(--dim)"}">${label}</span>
            </div>
            ${i<steps.length-1?`<div class="step-line" style="background:${S.step>i?"var(--green)":"var(--border)"}"></div>`:""}
          </div>`).join("")}
      </div>
      <div class="card" style="padding:28px">
        ${stepContent[S.step]}
        <div style="display:flex;justify-content:space-between;margin-top:28px;padding-top:20px;border-top:1px solid var(--border)">
          <button class="btn-ghost" onclick="if(S.step>0){S.step--;go()}" ${S.step===0?'style="opacity:0.3;pointer-events:none"':""}>← Back</button>
          ${S.step<3
            ?`<button class="btn-primary" onclick="S.step++;go()">Continue →</button>`
            :`<button class="btn-save" onclick="save()" ${S.saving?"disabled":""}>${S.saving?"Saving…":"✓ Save Referral"}</button>`}
        </div>
      </div>
    </div>`;
}

// ── Modal ──
function renderModal(){
  const r=S.refs.find(x=>x.id===S.sel); if(!r) return "";
  const e=S.editMode?S.editForm:r;

  // checklist items: [label, field, options]
  const ckFields=[
    ["Referral Form","referral_form",BOOL],
    ["Permission for Assessment","permission_assessment",STAT],
    ["Vineland","vineland",STAT],
    ["SRS-2","srs2",STAT],
    ["Attends School","attends_school",BOOL],
    ["IEP Report","iep_report",BOOL],
    ["Autism Diagnosis Docs","autism_diagnosis",["Received","Requested","Awaiting","N/A"]],
    ["Intake Paperwork","intake_paperwork",["Signed","Emailed via Adobe","Awaiting","N/A"]]
  ];

  function viewRow(label, val){
    return `<div class="info-row"><span class="info-label">${label}</span><span class="info-val">${val||"—"}</span></div>`;
  }
  function editTextField(key,val,placeholder=""){
    return `<input class="edit-input" value="${(val||"").replace(/"/g,"&quot;")}" oninput="S.editForm['${key}']=this.value" placeholder="${placeholder}">`;
  }
  function editDateField(key,val){
    return `<input type="date" class="edit-input" value="${val||""}" oninput="S.editForm['${key}']=this.value">`;
  }
  function editSelectField(key,val,opts){
    return `<select class="edit-select" onchange="S.editForm['${key}']=this.value">${opts.map(o=>`<option ${val===o?"selected":""}>${o}</option>`).join("")}</select>`;
  }
  function editOptField(key,val,opts){
    return `<div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">${opts.map(o=>{const c=sc(o);const a=val===o;return`<button class="edit-opt" onclick="S.editForm['${key}']='${o}';go()" style="border-color:${a?c:"var(--border)"};background:${a?c+"22":"var(--bg)"};color:${a?c:"var(--dim)"}">${o}</button>`;}	).join("")}</div>`;
  }

  const editBtnLabel = S.editMode ? "✏ Editing" : "✏ Edit Record";
  const footLeft = r.status==="active" ? `
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-ghost" onclick="setStatus('${r.id}','non-responsive')" style="color:#ef4444;border-color:#ef444440;font-size:12px">Mark Non-Responsive</button>
      <button class="btn-ghost" onclick="setStatus('${r.id}','referred-out')" style="color:#8b5cf6;border-color:#8b5cf640;font-size:12px">Referred Out</button>
    </div>` : `
    <button onclick="restoreActive('${r.id}')" style="padding:8px 16px;border-radius:8px;border:1px solid #22c55e40;background:#22c55e15;color:#22c55e;font-size:12px;font-weight:700;cursor:pointer">↩ Restore Active</button>`;

  return `
    <div class="overlay" onclick="S.sel=null;S.editMode=false;go()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-head">
          <div>
            <div class="modal-title">${r.first_name} ${r.last_name}</div>
            <div class="modal-sub">DOB: ${r.dob||"—"} · Received: ${r.date_received||"—"} · ${r.office||""}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            ${ring(pct(r))}
            <button class="btn-edit ${S.editMode?"active":""}" onclick="
              if(!S.editMode){S.editForm=Object.assign({},S.refs.find(x=>x.id===S.sel));S.editMode=true;go();}
              else{S.editMode=false;go();}
            ">${editBtnLabel}</button>
            <button class="close-btn" onclick="S.sel=null;S.editMode=false;go()">×</button>
          </div>
        </div>
        <div class="modal-body">
          <div>
            <div class="section-hdr">Caregiver</div>
            ${S.editMode
              ? `<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
                  <div><div class="label">Name</div>${editTextField("caregiver",e.caregiver,"Full Name")}</div>
                  <div><div class="label">Phone</div>${editTextField("caregiver_phone",e.caregiver_phone,"601-000-0000")}</div>
                  <div><div class="label">Email</div>${editTextField("caregiver_email",e.caregiver_email,"email@example.com")}</div>
                </div>`
              : `${[["Name",r.caregiver],["Phone",r.caregiver_phone],["Email",r.caregiver_email]].map(([l,v])=>`
                  <div style="margin-bottom:12px">
                    <div class="label">${l}</div>
                    <div style="color:#cbd5e1;font-size:14px">${v||"—"}</div>
                  </div>`).join("")}`
            }
            <div class="section-hdr" style="margin-top:4px">Insurance</div>
            ${S.editMode
              ? `<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:4px">
                  <div class="info-row"><span class="info-label">Primary</span>${editSelectField("insurance",e.insurance,INSURANCES)}</div>
                  <div class="info-row"><span class="info-label">Secondary</span>${editSelectField("secondary_insurance",e.secondary_insurance,["None",...INSURANCES])}</div>
                  <div class="info-row"><span class="info-label">Verified</span>${editOptField("insurance_verified",e.insurance_verified,BOOL)}</div>
                </div>`
              : `<div class="info-row"><span class="info-label">Primary</span><span class="info-val">${r.insurance||"—"}</span></div>
                 <div class="info-row"><span class="info-label">Secondary</span><span class="info-val">${r.secondary_insurance||"—"}</span></div>
                 <div class="info-row"><span class="info-label">Verified</span>${bdg(r.insurance_verified)}</div>`
            }
            <div class="section-hdr" style="margin-top:16px">Contact Log</div>
            ${S.editMode
              ? `<div style="display:flex;flex-direction:column;gap:8px">
                  ${[["contact1","1st"],["contact2","2nd"],["contact3","3rd"]].map(([k,l])=>`
                    <div class="info-row"><span class="info-label">${l} Contact</span>${editDateField(k,e[k])}</div>`).join("")}
                </div>`
              : `${[["1st",r.contact1],["2nd",r.contact2],["3rd",r.contact3]].map(([l,v])=>`
                  <div class="info-row">
                    <span class="info-label">${l} Contact</span>
                    <span class="${v?"contact-val":"info-val"}">${v||"—"}</span>
                  </div>`).join("")}`
            }
            ${S.editMode
              ? `<div style="margin-top:12px">
                  <div class="label">Date Received</div>
                  ${editDateField("date_received",e.date_received)}
                </div>
                <div style="margin-top:10px">
                  <div class="label">Office</div>
                  ${editSelectField("office",e.office,OFFICES)}
                </div>`:""
            }
          </div>
          <div>
            <div class="section-hdr">Intake Checklist</div>
            ${ckFields.map(([l,key,opts])=>`
              <div class="info-row">
                <span class="info-label">${l}</span>
                ${S.editMode?editOptField(key,e[key],opts):bdg(r[key])}
              </div>`).join("")}
            <div style="margin-top:14px">
              <div class="label">Intake Personnel</div>
              ${S.editMode
                ? editSelectField("intake_personnel",e.intake_personnel,STAFF)
                : `<div style="color:#a5b4fc;font-weight:700;font-size:15px;margin-top:4px">${r.intake_personnel||"—"}</div>`}
            </div>
            ${S.editMode
              ? `<div style="margin-top:14px">
                  <div class="label">Notes</div>
                  <textarea class="edit-input" rows="3" oninput="S.editForm.notes=this.value" style="resize:vertical">${e.notes||""}</textarea>
                </div>`
              : (r.notes?`<div style="margin-top:12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px"><div class="label" style="margin-bottom:6px">Notes</div><div style="color:var(--muted);font-size:13px">${r.notes}</div></div>`:"")
            }
          </div>
        </div>
        <div class="modal-foot">
          ${footLeft}
          <div style="display:flex;gap:8px">
            ${S.editMode
              ? `<button class="btn-ghost" onclick="S.editMode=false;go()">Cancel</button>
                 <button class="btn-save" onclick="saveEdit()" ${S.updatingSel?"disabled":""}>
                   ${S.updatingSel?"Saving…":"💾 Save Changes"}
                 </button>`
              : `<button class="btn-primary" onclick="S.sel=null;go()">Close</button>`
            }
          </div>
        </div>
      </div>
    </div>`;
}

load();
</script>
</body>
</html>
